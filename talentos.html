<!-- Declara que o documento é HTML5 -->
<!DOCTYPE html>

<!-- Define idioma da página -->
<html lang="pt-br">

<head>

<!-- Define codificação -->
<meta charset="UTF-8">

<!-- Responsividade -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Título -->
<title>Banco de Talentos | Ybyra Casting</title>

<!-- Importa Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Importa CSS do projeto -->
<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- Container principal -->
<div class="container mt-5">

<!-- Título da página -->
<h1 class="mb-4 text-center">Banco de Talentos</h1>

<!-- Área de filtros -->
<div class="row mb-4">

<!-- Filtro de altura -->
<div class="col-md-3">

<label class="form-label">Altura mínima (cm)</label>

<input type="number" id="filtroAltura" class="form-control">

</div>

<!-- Filtro de idade -->
<div class="col-md-3">

<label class="form-label">Idade máxima</label>

<input type="number" id="filtroIdade" class="form-control">

</div>

<!-- Filtro de nacionalidade -->
<div class="col-md-3">

<label class="form-label">Nacionalidade</label>

<input type="text" id="filtroNacionalidade" class="form-control">

</div>

<!-- Filtro de etnia -->
<div class="col-md-3">

<label class="form-label">Etnia</label>

<input type="text" id="filtroEtnia" class="form-control">

</div>

</div>


<!-- Botão de busca -->
<div class="text-center mb-5">

<button class="btn btn-dark" onclick="buscarTalentos()">

Buscar talentos

</button>

</div>


<!-- Área onde os talentos serão exibidos -->
<div id="listaTalentos" class="row">

</div>

</div>


<!-- Importa JS -->
<script src="../js/talentos.js"></script>

</body>

</html>
