<!-- Declara o tipo de documento como HTML5 -->
<!DOCTYPE html>

<!-- Define idioma principal da página como português -->
<html lang="pt-br">

<head>

    <!-- Define padrão de caracteres -->
    <meta charset="UTF-8">

    <!-- Ajusta o site para telas responsivas -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Título da página que aparece na aba do navegador -->
    <title>Cadastro de Talentos | Ybyra Casting</title>

    <!-- Importa o Bootstrap 5.3 para facilitar o layout -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Importa o CSS do projeto -->
    <link rel="stylesheet" href="style.css">


</head>

<body>

<!-- Container central da página -->
<div class="container mt-5">

    <!-- Título da página -->
    <h1 class="text-center mb-4">Inscrição no Casting</h1>

    <!-- Texto explicativo -->
    <p class="text-center">
        O cadastro no banco de talentos da Ybyra Casting é aberto a todos.
        Menores de idade devem possuir autorização formal dos responsáveis.
        A Ybyra atua como ponte estratégica entre produtores e talentos.
    </p>

    <!-- Início do formulário -->
    <form id="formCasting">

        <!-- Campo Nome -->
        <div class="mb-3">

            <!-- Label descrevendo o campo -->
            <label class="form-label">Nome completo</label>

            <!-- Campo de texto para o nome -->
            <input type="text" class="form-control" id="nome" required>

        </div>


        <!-- Campo Data de nascimento -->
        <div class="mb-3">

            <!-- Texto do campo -->
            <label class="form-label">Data de nascimento</label>

            <!-- Campo do tipo data -->
            <input type="date" class="form-control" id="nascimento" required>

        </div>


        <!-- Campo altura -->
        <div class="mb-3">

            <!-- Texto do campo -->
            <label class="form-label">Altura (cm)</label>

            <!-- Campo numérico -->
            <input type="number" class="form-control" id="altura">

        </div>


        <!-- Campo peso -->
        <div class="mb-3">

            <!-- Texto do campo -->
            <label class="form-label">Peso (kg)</label>

            <!-- Campo numérico -->
            <input type="number" class="form-control" id="peso">

        </div>


        <!-- Campo nacionalidade -->
        <div class="mb-3">

            <!-- Texto do campo -->
            <label class="form-label">Nacionalidade</label>

            <!-- Campo de texto -->
            <input type="text" class="form-control" id="nacionalidade">

        </div>


        <!-- Campo etnia -->
        <div class="mb-3">

            <!-- Texto do campo -->
            <label class="form-label">Etnia</label>

            <!-- Campo de texto -->
            <input type="text" class="form-control" id="etnia">

        </div>


        <!-- Campo cor dos olhos -->
        <div class="mb-3">

            <!-- Texto -->
            <label class="form-label">Cor dos olhos</label>

            <!-- Campo -->
            <input type="text" class="form-control" id="olhos">

        </div>


        <!-- Campo cor do cabelo -->
        <div class="mb-3">

            <!-- Texto -->
            <label class="form-label">Cor do cabelo</label>

            <!-- Campo -->
            <input type="text" class="form-control" id="cabelo">

        </div>


        <!-- Campo experiência -->
        <div class="mb-3">

            <!-- Texto -->
            <label class="form-label">Experiência profissional</label>

            <!-- Área de texto maior -->
            <textarea class="form-control" id="experiencia" rows="4"></textarea>

        </div>


        <!-- Campo upload de fotos -->
        <div class="mb-3">

            <!-- Texto -->
            <label class="form-label">Fotos</label>

            <!-- Campo para upload de arquivos -->
            <input type="file" class="form-control" id="fotos" multiple>

        </div>


        <!-- Campo vídeo -->
        <div class="mb-3">

            <!-- Texto -->
            <label class="form-label">Link de vídeo (opcional)</label>

            <!-- Campo de link -->
            <input type="url" class="form-control" id="video">

        </div>


        <!-- Campo disponibilidade -->
        <div class="mb-3">

            <!-- Texto -->
            <label class="form-label">Disponibilidade</label>

            <!-- Área de texto -->
            <textarea class="form-control" id="disponibilidade"></textarea>

        </div>


        <!-- Botão de envio -->
        <button type="submit" class="btn btn-dark">

            Enviar inscrição

        </button>

    </form>

</div>


<!-- Importa o arquivo JavaScript do projeto -->
<script src="../js/casting.js"></script>

</body>

</html>
